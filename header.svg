<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="1200" height="350" viewBox="0 0 1200 350">
<defs>
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#0f172a">
<animate attributeName="stop-color" values="#0f172a;#172554;#0f172a" dur="14s" repeatCount="indefinite"/>
</stop>
<stop offset="100%" stop-color="#1d4ed8">
<animate attributeName="stop-color" values="#1d4ed8;#0891b2;#1d4ed8" dur="14s" repeatCount="indefinite"/>
</stop>
</linearGradient>
<filter id="blur"><feGaussianBlur stdDeviation="22"/></filter>
<style>
.title{font:700 54px Segoe UI,Arial,sans-serif;fill:white}
.sub{font:22px Segoe UI,Arial,sans-serif;fill:#dbeafe}
.btn{fill:#ffffff18;stroke:#7dd3fc;stroke-width:1.5;rx:12}
.btnt{font:18px Segoe UI;fill:white}
.small{font:16px Segoe UI;fill:#93c5fd}
</style>
</defs>

<rect width="1200" height="350" fill="url(#bg)"/>

<g filter="url(#blur)">
<circle cx="180" cy="70" r="60" fill="#67e8f944">
<animate attributeName="cy" values="70;110;70" dur="8s" repeatCount="indefinite"/>
</circle>
<circle cx="1000" cy="260" r="90" fill="#60a5fa33">
<animate attributeName="cx" values="1000;930;1000" dur="10s" repeatCount="indefinite"/>
</circle>
</g>

<!-- stars -->
<g fill="white">
<circle cx="90" cy="40" r="2"><animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite"/></circle>
<circle cx="220" cy="90" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite"/></circle>
<circle cx="850" cy="60" r="2"><animate attributeName="opacity" values="0.3;1;0.3" dur="2.5s" repeatCount="indefinite"/></circle>
<circle cx="1080" cy="100" r="2"><animate attributeName="opacity" values="1;0.2;1" dur="4s" repeatCount="indefinite"/></circle>
</g>

<!-- network -->
<g stroke="#7dd3fc55" stroke-width="1.2">
<line x1="120" y1="250" x2="220" y2="210"/>
<line x1="220" y1="210" x2="310" y2="250"/>
<line x1="930" y1="120" x2="1040" y2="170"/>
<line x1="1040" y1="170" x2="1110" y2="120"/>
</g>

<g fill="#7dd3fc">
<circle cx="120" cy="250" r="4"/><circle cx="220" cy="210" r="4"/><circle cx="310" cy="250" r="4"/>
<circle cx="930" cy="120" r="4"/><circle cx="1040" cy="170" r="4"/><circle cx="1110" cy="120" r="4"/>
</g>

<text x="600" y="145" text-anchor="middle" class="title">Muhammad Awais
<animate attributeName="opacity" values="0;1" dur="2s" fill="freeze"/>
</text>

<text x="600" y="185" text-anchor="middle" class="sub">Data Science • Machine Learning • Python • AI</text>

<text x="600" y="215" text-anchor="middle" class="small">Building practical, data-driven solutions</text>

<a xlink:href="https://www.linkedin.com/in/muhammad-awais-b35a63338" target="_blank">
<rect x="430" y="245" width="340" height="48" rx="14" fill="#ffffff18" stroke="#7dd3fc"/>
<text x="600" y="275" text-anchor="middle" class="btnt">🔗 Connect on LinkedIn</text>
</a>

<!-- floating symbols -->
<g class="small">
<text x="120" y="320">&lt;/&gt;<animateTransform attributeName="transform" type="translate" values="0,0;10,-6;0,0" dur="6s" repeatCount="indefinite"/></text>
<text x="1040" y="300">{ }</text>
<text x="980" y="55">λ</text>
<text x="180" y="55">π</text>
</g>

<path d="M0 320 Q150 300 300 320 T600 320 T900 320 T1200 320 V350 H0Z" fill="#ffffff12">
<animate attributeName="d" dur="8s" repeatCount="indefinite"
values="M0 320 Q150 300 300 320 T600 320 T900 320 T1200 320 V350 H0Z;
M0 325 Q150 340 300 320 T600 330 T900 310 T1200 325 V350 H0Z;
M0 320 Q150 300 300 320 T600 320 T900 320 T1200 320 V350 H0Z"/>
</path>
</svg>
